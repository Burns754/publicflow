version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=sqlite:///./publicflow.db
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./backend:/app
      - ./data:/app/data
    command: python3 app.py
    networks:
      - publicflow

  # PostgreSQL (optional, für Production)
  # db:
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_DB: publicflow
  #     POSTGRES_USER: ${DB_USER}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   networks:
  #     - publicflow

networks:
  publicflow:
    driver: bridge

